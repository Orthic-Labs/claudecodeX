<!doctype html>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; }
  body {
    background: #0B0D10;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #F5F2EA;
    overflow: hidden;
  }

  /* Text band on top, the real two-session desktop below it at full width. No cropping, no overlap:
     the screenshot is the user's own product proof and is shown whole. */
  .head {
    height: 340px;
    padding: 0 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .wordmark { width: 356px; display: block; margin-bottom: 30px; }

  h1 {
    font-size: 44px;
    line-height: 1.14;
    font-weight: 700;
    letter-spacing: -0.015em;
  }

  p {
    margin-top: 20px;
    font-size: 23px;
    line-height: 1.45;
    color: #9CA1A7;
    max-width: 900px;
  }
  p b { color: #F5F2EA; font-weight: 600; }

  .shot {
    display: block;
    width: 1280px;
    border-top: 1px solid #252A31;
  }
</style>

<div class="head">
  <img class="wordmark" src="anyclaude-wordmark.svg" alt="ANYCLAUDE">
  <h1>Run two Claude Desktop instances simultaneously.</h1>
  <p>Your Anthropic subscription in one. <b>MiniMax, GLM, Kimi, or a local gateway</b> in the other. Both open at once.</p>
</div>

<img class="shot" src="claude-desktop-side-by-side.png" alt="">
