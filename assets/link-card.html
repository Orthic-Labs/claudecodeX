<!doctype html>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 640px; }
  body {
    background: #0B0D10;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #F5F2EA;
    overflow: hidden;
    position: relative;
  }

  /* 2:1 link-share card (1280x640). Text left, the whole two-session desktop framed on the right,
     no crop. Screenshot small enough that its session text is texture, not readable content. */
  .proof {
    position: absolute;
    top: 50%;
    right: 46px;
    transform: translateY(-50%);
    width: 604px;
    border: 1px solid #252A31;
    border-radius: 9px;
    overflow: hidden;
    line-height: 0;
  }
  .proof img { width: 100%; display: block; }
  .proof::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(11, 13, 16, 0.14);
  }

  .left {
    position: relative;
    z-index: 2;
    height: 100%;
    width: 636px;
    padding: 0 0 0 70px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .wordmark { width: 372px; display: block; margin: 0 0 38px -14px; }

  h1 {
    font-size: 40px;
    line-height: 1.15;
    font-weight: 700;
    letter-spacing: -0.015em;
    max-width: 520px;
  }

  p {
    margin-top: 22px;
    font-size: 21px;
    line-height: 1.5;
    color: #9CA1A7;
    max-width: 520px;
  }
  p b { color: #F5F2EA; font-weight: 600; }

  .route {
    margin-top: 46px;
    display: flex;
    align-items: center;
    gap: 13px;
    font-family: "SFMono-Regular", Consolas, monospace;
    font-size: 18px;
    color: #6E7378;
    white-space: nowrap;
  }
  .route .line { width: 42px; height: 1px; background: #252A31; flex: none; }
  .route .dest { color: #D97757; }
</style>

<div class="proof"><img src="claude-desktop-side-by-side.png" alt=""></div>

<div class="left">
  <img class="wordmark" src="anyclaude-wordmark.svg" alt="ANYCLAUDE">
  <h1>Run two Claude Desktop instances simultaneously.</h1>
  <p>Your Anthropic subscription in one. <b>MiniMax, GLM, Kimi, or a local gateway</b> in the other. Both open at once.</p>
  <div class="route">
    <span>anyclaude</span>
    <span class="line"></span>
    <span>127.0.0.1:8801</span>
    <span class="line"></span>
    <span class="dest">your provider</span>
  </div>
</div>
